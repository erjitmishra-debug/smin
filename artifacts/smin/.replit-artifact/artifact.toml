kind = "web"
previewPath = "/"
title = "SMIN — Shanvi Mine Intelligence"
version = "1.0.0"
id = "artifacts/smin"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21473

[services.development]
run = "pnpm --filter @workspace/smin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smin", "run", "build" ]
serve = "static"
publicDir = "artifacts/smin/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21473"
BASE_PATH = "/"
